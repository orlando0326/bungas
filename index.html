<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login App Van</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playwrite+IE+Guides&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-color: rgb(107, 236, 102);
    font-family: Arial, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

.container{
    width:100%;
    max-width:350px;

    padding:20px;
    text-align:center;
}

h1{
    color:white;
    margin-bottom:20px;
    font-size:32px;
}

.logo{
    width:180px;
    margin-bottom:30px;
}

.input_container{
    display:flex;
    flex-direction:column;
    margin-bottom:15px;
    text-align:left;
}

.input_container label{
    color:white;
    margin-bottom:5px;
}

.input_container input{
    width:100%;
    height:40px;
    border:none;
    border-radius:10px;
    padding:10px;
}

.esqueci{
    margin-top:5px;
    color:white;
    text-decoration:none;
    font-size:14px;
}

.btn{
    width:100%;
    height:40px;
    border:none;
    border-radius:10px;

    background:white;
    color:blue;

    font-size:18px;
    cursor:pointer;

    margin-top:10px;
}

p{
    color:white;
    margin:20px 0 10px;
}

.cadastro{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.btn-social{
    width:100%;
    height:50px;

    background:white;

    border-radius:12px;

    display:flex;
    align-items:center;
    justify-content:center;

    margin-top:15px;
}

.btn-social a{
    text-decoration:none;
    color:black;

    display:flex;
    align-items:center;
    gap:10px;
}

.btn-social img{
    width:28px;
    height:28px;
}

</style>
</head>

<body>

<div class="container">

    <h1>App Van</h1>

    <img class="logo" src="ford-transit-pasajeros-2020-minibus-camioneta-van-bus-exterior-blanca-frente-edificio-over.jpg" alt="logo">

    <form>

        <div class="input_container">
            <label for="login">Login</label>
            <input type="email" id="login">
        </div>

        <div class="input_container">
            <label for="senha">Senha</label>
            <input type="password" id="senha">

            <a class="esqueci" href="#">
                Esqueci a senha
            </a>
        </div>

        <button class="btn">Login</button>

    </form>

    <p>Não tem uma conta?</p>

    <a class="cadastro" href="#">
        Cadastre-se
    </a>

    <div class="btn-social">
        <a href="#">
            <img src="channels4_profile.jpg" alt="">
            Login com Google
        </a>
    </div>

    <div class="btn-social">
        <a href="#">
            <img src="images.png" alt="">
            Login com Facebook
        </a>
    </div>

</div>

</body>
</html>
